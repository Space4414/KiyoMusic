name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ./build
            ./composeApp/build
          key: gradle-debug-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-debug-${{ runner.os }}-

      - name: Build debug APK (no signing required)
        run: ./gradlew assembleGithubUniversalProdDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp composeApp/build/outputs/apk/githubUniversalProd/debug/Kreate-debug.apk out/KiyoMusic-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KiyoMusic-debug-apk
          path: out/KiyoMusic-debug.apk
          retention-days: 7
