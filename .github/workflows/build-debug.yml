name: Alpha Build

# Triggers on every push to main OR manual dispatch.
# Each run produces 4 architecture-split, minified APKs (~14 MB each)
# signed with a CI-generated keystore and published as a pre-release.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: alpha-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # required to create releases and upload assets

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # One job per architecture – they run in parallel on separate runners.
  # Release build type is used (isMinifyEnabled + isShrinkResources = true)
  # which shrinks APKs from ~40 MB (debug) to ~14 MB (release).
  # A fresh self-signed keystore is generated per job so the APK is
  # installable on devices (Android requires all APKs to be signed).
  # ──────────────────────────────────────────────────────────────────────────

  build-arm64:
    name: Build arm64-v8a
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-arm64-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-arm64-${{ runner.os }}-

      - name: Generate CI signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/ci-keystore.jks" \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=KiyoMusic CI, O=KiyoMusic, C=US" \
            -storepass cipassword \
            -keypass cipassword

      - name: Build arm64 release APK
        run: |
          ./gradlew assembleGithubArm64ProdRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/ci-keystore.jks" \
            -Pandroid.injected.signing.store.password=cipassword \
            -Pandroid.injected.signing.key.alias=ci \
            -Pandroid.injected.signing.key.password=cipassword \
            --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          cp composeApp/build/outputs/apk/githubArm64Prod/release/Kreate-arm64-v8a.apk \
             out/KiyoMusic-arm64-v8a.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-arm64
          path: out/KiyoMusic-arm64-v8a.apk
          retention-days: 3

  build-arm32:
    name: Build armeabi-v7a
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-arm32-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-arm32-${{ runner.os }}-

      - name: Generate CI signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/ci-keystore.jks" \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=KiyoMusic CI, O=KiyoMusic, C=US" \
            -storepass cipassword \
            -keypass cipassword

      - name: Build arm32 release APK
        run: |
          ./gradlew assembleGithubArm32ProdRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/ci-keystore.jks" \
            -Pandroid.injected.signing.store.password=cipassword \
            -Pandroid.injected.signing.key.alias=ci \
            -Pandroid.injected.signing.key.password=cipassword \
            --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          cp composeApp/build/outputs/apk/githubArm32Prod/release/Kreate-armeabi-v7a.apk \
             out/KiyoMusic-armeabi-v7a.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-arm32
          path: out/KiyoMusic-armeabi-v7a.apk
          retention-days: 3

  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-x86_64-${{ runner.os }}-${{ hashFiles('**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-x86_64-${{ runner.os }}-

      - name: Generate CI signing keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$GITHUB_WORKSPACE/ci-keystore.jks" \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=KiyoMusic CI, O=KiyoMusic, C=US" \
            -storepass cipassword \
            -keypass cipassword

      - name: Build x86_64 release APK
        run: |
          ./gradlew assembleGithubX86_64ProdRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/ci-keystore.jks" \
            -Pandroid.injected.signing.store.password=cipassword \
            -Pandroid.injected.signing.key.alias=ci \
            -Pandroid.injected.signing.key.password=cipassword \
