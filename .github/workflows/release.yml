name: Release Build

  on:
    push:
      tags:
        - 'v*'

  jobs:
    release:
      name: Build & Publish Release APK
      runs-on: ubuntu-latest
      permissions:
        contents: write        # needed to create GitHub Releases

      steps:
        - name: Checkout (with submodules)
          uses: actions/checkout@v4
          with:
            submodules: recursive
            fetch-depth: 0

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: gradle

        - name: Decode keystore
          env:
            KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
          run: |
            echo "$KEY_STORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore

        - name: Grant execute permission for gradlew
          run: chmod +x ./gradlew

        - name: Build signed release APK
          env:
            STORE_FILE: ${{ github.workspace }}/release.keystore
            STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
            KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
            KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          run: |
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="$STORE_FILE" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

        - name: Collect APK
          run: |
            mkdir -p out
            find . -name "*.apk" -path "*/release/*" -not -path "*/test*" | while read f; do
              base=$(basename "$f" .apk)
              cp "$f" "out/${base}-${{ github.ref_name }}.apk"
            done
            echo "--- APKs built ---"
            ls out/

        - name: Create GitHub Release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: ${{ github.ref_name }}
            name: KiyoMusic ${{ github.ref_name }}
            generate_release_notes: true
            files: out/*.apk
  